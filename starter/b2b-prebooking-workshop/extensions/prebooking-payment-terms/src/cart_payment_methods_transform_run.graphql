query CartPaymentMethodsTransformRunInput {
  cart {
    buyerIdentity {
      purchasingCompany {
        company {
          id
        }
      }
    }
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            metafield(namespace: "custom", key: "b2b-prebooking") {
              value
            }
          }
        }
      }
    }
  }
  paymentMethods {
    id
    name
  }
}
