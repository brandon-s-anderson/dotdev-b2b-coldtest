# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
#
# This starter ships UNLINKED (no client_id): the first `shopify app dev` links the app in YOUR
# Partner org and writes client_id into this file in place.
#
# The pre-booking data model (the "season" metaobject + the custom.b2b-prebooking product metafield)
# is NOT declared here. It is created STORE-OWNED by the pre-work seed script (workshop-assets/setup/
# setup-store.mjs), so it is fully visible + editable in Admin (Settings, Custom data) and the theme
# block + Function read it via the "custom" namespace. Keeping the data model out of this file means
# the first `shopify app dev` needs no write scopes to start, so it links cleanly on a fresh store.

name = "b2b-prebooking-workshop"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# The only scopes the app itself needs: payment customizations, so it can run
# paymentCustomizationCreate (Part 3 Plus activation) from its own GraphiQL (press `g`). Non-Plus
# builders never use these. (Store data + the data model are seeded via the CLI store-auth in
# pre-work, not by this app.)
scopes = "read_payment_customizations,write_payment_customizations"

[auth]
redirect_urls = [ "https://shopify.dev/apps/default-app-home/api/auth" ]
